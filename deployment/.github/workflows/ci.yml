"""GitHub Actions CI/CD workflow."""
name: AutonomDS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check app/ tests/ --ignore=ANN

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=xml -x
        env:
          APP_ENV: testing
          LLM_PROVIDER: huggingface
          HUGGINGFACE_API_TOKEN: dummy

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t autonomds-api:test .

      - name: Build Frontend image
        run: docker build -f docker/Dockerfile.frontend -t autonomds-frontend:test .

      - name: Build Worker image
        run: docker build -f docker/Dockerfile.worker -t autonomds-worker:test .
