services:
  - type: web
    name: autonomds-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: APP_ENV
        value: production
      - key: LLM_PROVIDER
        value: huggingface
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: CHROMA_PERSIST_DIR
        value: /opt/render/project/src/experiments/chroma_db
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
      - key: REPORTS_DIR
        value: /opt/render/project/src/experiments/reports
      - key: REDIS_URL
        fromService:
          name: autonomds-redis
          type: redis
          property: connectionString
    disk:
      name: autonomds-data
      mountPath: /opt/render/project/src/experiments
      sizeGB: 1

  - type: redis
    name: autonomds-redis
    plan: free
    maxmemoryPolicy: noeviction
